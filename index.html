<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配当生活ナビ｜高配当ETF・投信比較</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">配当生活ナビ</div>
<nav>
  <a href="ranking.html">ランキング</a>
  <a href="#">投信</a>
  <a href="#">ETF</a>
  <a href="#simulator">シミュレーター</a>
</nav>
</header>

<section class="hero">
  <h1>高配当ETF・投信を<br>かんたん比較</h1>
  <p>分配金・利回り・NISA対応をまとめてチェック</p>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="例：毎月分配 米国株 NISA">
    <button onclick="searchFunds()">検索</button>
  </div>
</section>

<section class="filters">
  <button onclick="filterFunds('毎月分配')">毎月分配</button>
  <button onclick="filterFunds('日本株')">日本株</button>
  <button onclick="filterFunds('米国株')">米国株</button>
  <button onclick="filterFunds('NISA')">NISA</button>
  <button onclick="showAllFunds()">すべて表示</button>
</section>

<main>
  <h2>人気の高配当商品</h2>
  <div id="fundList" class="card-grid"></div>
</main>

<section class="simulator" id="simulator">

<h2>配当金シミュレーター</h2>

<p>
投資額から分配金、または欲しい分配金から必要資金を計算できます。
</p>


<h3>① 投資額から計算</h3>

<input id="amount" 
type="number" 
placeholder="投資額 例：10000000">

<input id="yieldRate" 
type="number" 
placeholder="利回り 例：5">

<button onclick="calculateDividend()">
分配金を計算
</button>


<div id="result"></div>


<hr>


<h3>② 必要資金を逆算</h3>

<input id="targetIncome" 
type="number" 
placeholder="欲しい月額配当 例：50000">

<input id="targetYield" 
type="number" 
placeholder="想定利回り 例：5">

<button onclick="calculateNeedMoney()">
必要資金を計算
</button>


<div id="needResult"></div>

</section>

<footer>
  <p>※本サイトは情報提供を目的としており、投資判断は自己責任でお願いします。</p>
</footer>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
